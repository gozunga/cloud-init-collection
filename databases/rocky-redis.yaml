#cloud-config
# Rocky/Alma: Valkey single-node starter (localhost bind).
# Valkey is the RHEL/Rocky 10 Redis-compatible replacement.
# Set requirepass CHANGE_ME.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - valkey

runcmd:
  - |
    conf=/etc/valkey/valkey.conf
    sed -i 's/^bind .*/bind 127.0.0.1 ::1/' "$conf" || true
    if grep -q '^# requirepass' "$conf"; then
      sed -i 's/^# requirepass.*/requirepass CHANGE_ME/' "$conf"
    elif grep -q '^requirepass' "$conf"; then
      sed -i 's/^requirepass.*/requirepass CHANGE_ME/' "$conf"
    else
      echo 'requirepass CHANGE_ME' >> "$conf"
    fi
    sed -i 's/^protected-mode no/protected-mode yes/' "$conf" || true
  - systemctl enable --now valkey
  - systemctl restart valkey

final_message: "Valkey (Redis-compatible) ready on localhost with requirepass CHANGE_ME."
