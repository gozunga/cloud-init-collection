#cloud-config
# Rocky/Alma: LibreNMS via official Docker Compose stack
# UI: http://<server-ip>:8000
# Also publishes syslog 514/tcp+udp and SNMP traps 162/tcp+udp
#
# Based on: https://docs.librenms.org/Installation/Docker/
#           https://github.com/librenms/docker
#
# First boot pulls several images; allow several minutes.
# DB password is generated and saved to /opt/librenms/DB_PASSWORD.txt

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - openssl
  - tar

runcmd:
  - dnf install -y dnf-plugins-core
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - |
    set -euo pipefail
    install -d -m 0755 /opt/librenms
    cd /opt/librenms

    # Pull official example compose files (avoids fragile nested cloud-config YAML)
    curl -fsSL https://raw.githubusercontent.com/librenms/docker/master/examples/compose/compose.yml -o compose.yml
    curl -fsSL https://raw.githubusercontent.com/librenms/docker/master/examples/compose/librenms.env -o librenms.env
    curl -fsSL https://raw.githubusercontent.com/librenms/docker/master/examples/compose/msmtpd.env -o msmtpd.env

    # Placeholder SMTP values (edit later if you want email alerts)
    printf '%s\n' \
      'SMTP_HOST=smtp.example.com' \
      'SMTP_PORT=587' \
      'SMTP_TLS=on' \
      'SMTP_STARTTLS=on' \
      'SMTP_TLS_CHECKCERT=on' \
      'SMTP_AUTH=on' \
      'SMTP_USER=CHANGE_ME' \
      'SMTP_PASSWORD=CHANGE_ME' \
      'SMTP_FROM=librenms@example.com' \
      > msmtpd.env

    DBPASS="$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)"
    printf '%s\n' \
      'TZ=UTC' \
      'PUID=1000' \
      'PGID=1000' \
      'MYSQL_DATABASE=librenms' \
      'MYSQL_USER=librenms' \
      "MYSQL_PASSWORD=${DBPASS}" \
      > .env

    umask 077
    printf '%s\n' "${DBPASS}" > /opt/librenms/DB_PASSWORD.txt
    chmod 600 /opt/librenms/DB_PASSWORD.txt

    # Start compose now only if kernel wasn't upgraded; otherwise it starts via service after reboot
    running_kern=$(uname -r)
    newest_kern=$(ls -1 /lib/modules | sort -V | tail -1)
    if [ "$running_kern" = "$newest_kern" ]; then
      systemctl start docker
      docker compose -f compose.yml --env-file .env up -d
      docker compose -f compose.yml ps
    else
      echo "Kernel upgraded; LibreNMS will start after reboot."
      cat > /etc/systemd/system/librenms-stack.service << 'EOF'
      [Unit]
      Description=LibreNMS Docker Compose stack
      After=docker.service
      Requires=docker.service
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/librenms
      ExecStart=/usr/bin/docker compose -f compose.yml --env-file .env up -d
      [Install]
      WantedBy=multi-user.target
      EOF
      systemctl daemon-reload
      systemctl enable librenms-stack
    fi

power_state:
  delay: "now"
  mode: reboot
  message: "Rebooting after kernel module upgrade for Docker."
  condition: |
    #!/bin/bash
    [ "$(uname -r)" != "$(ls -1 /lib/modules | sort -V | tail -1)" ]

final_message: "LibreNMS stack is up on :8000. DB password saved in /opt/librenms/DB_PASSWORD.txt"
