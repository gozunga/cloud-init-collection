#cloud-config
# Rocky/Alma: lightweight Prometheus + Grafana via Docker Compose.
# Grafana :3000 (admin/admin — change immediately), Prometheus :9090.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates

write_files:
  - path: /opt/observability/docker-compose.yml
    permissions: '0644'
    content: |
      services:
        prometheus:
          image: prom/prometheus:v3.4.1
          restart: unless-stopped
          volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prom_data:/prometheus
          ports:
            - "9090:9090"
        grafana:
          image: grafana/grafana:12.0.1
          restart: unless-stopped
          environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
          ports:
            - "3000:3000"
          volumes:
            - graf_data:/var/lib/grafana
          depends_on:
            - prometheus
      volumes:
        prom_data:
        graf_data:

  - path: /opt/observability/prometheus.yml
    permissions: '0644'
    content: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets: ["prometheus:9090"]

runcmd:
  - dnf install -y dnf-plugins-core
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - |
    # Create systemd service so compose starts after reboot if kernel was upgraded
    cat > /etc/systemd/system/observability-stack.service << 'EOF'
    [Unit]
    Description=Prometheus + Grafana stack
    After=docker.service
    Requires=docker.service
    [Service]
    Type=oneshot
    RemainAfterExit=yes
    WorkingDirectory=/opt/observability
    ExecStart=/usr/bin/docker compose up -d
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    systemctl enable observability-stack
  - |
    running_kern=$(uname -r)
    newest_kern=$(ls -1 /lib/modules | sort -V | tail -1)
    if [ "$running_kern" = "$newest_kern" ]; then
      systemctl start docker
      cd /opt/observability && docker compose up -d
    else
      echo "Kernel upgraded ($running_kern -> $newest_kern); compose will start after reboot."
    fi

power_state:
  delay: "now"
  mode: reboot
  message: "Rebooting after kernel module upgrade for Docker."
  condition: |
    #!/bin/bash
    [ "$(uname -r)" != "$(ls -1 /lib/modules | sort -V | tail -1)" ]

final_message: "Prometheus :9090 and Grafana :3000 (admin/admin) are up."
