#cloud-config
# Rocky/Alma: lightweight Prometheus + Grafana via Docker Compose.
# Grafana :3000 (admin/admin — change immediately), Prometheus :9090.

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates

write_files:
  - path: /opt/observability/docker-compose.yml
    permissions: '0644'
    content: |
      services:
        prometheus:
          image: prom/prometheus:v3.4.1
          restart: unless-stopped
          volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prom_data:/prometheus
          ports:
            - "9090:9090"
        grafana:
          image: grafana/grafana:12.0.1
          restart: unless-stopped
          environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
          ports:
            - "3000:3000"
          volumes:
            - graf_data:/var/lib/grafana
          depends_on:
            - prometheus
      volumes:
        prom_data:
        graf_data:

  - path: /opt/observability/prometheus.yml
    permissions: '0644'
    content: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets: ["prometheus:9090"]

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - cd /opt/observability && docker compose up -d

final_message: "Prometheus :9090 and Grafana :3000 (admin/admin) are up."
