#cloud-config
# Rocky/RHEL-style: Node.js (NodeSource 22.x) + create-next-app starter, systemd on :3000
# After boot: http://<server-ip>:3000/
# First boot downloads npm packages and can take a few minutes.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i \
        -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
        -e 's/^[[:space:]]*metalink=/# metalink=/' \
        "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i \
        -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
        -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - git

write_files:
  - path: /etc/systemd/system/nextjs-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Next.js app
      After=network.target

      [Service]
      SELinuxContext=system_u:system_r:unconfined_t:s0-s0:c0.c1023
      Type=simple
      User=nobody
      WorkingDirectory=/opt/nextjs-app
      Environment=NODE_ENV=production
      Environment=PORT=3000
      Environment=HOSTNAME=0.0.0.0
      ExecStart=/usr/bin/npm run start --prefix /opt/nextjs-app
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    export HOME=/root
    curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
    dnf install -y nodejs
    if [ ! -f /opt/nextjs-app/package.json ]; then
      npx --yes create-next-app@latest /opt/nextjs-app \
        --ts --eslint --app --src-dir --import-alias "@/*" \
        --tailwind --use-npm --no-turbopack
    fi
    cd /opt/nextjs-app
    npm run build
    chown -R nobody:nobody /opt/nextjs-app
    systemctl daemon-reload
    systemctl enable --now nextjs-app

final_message: "Next.js app listening on :3000 after $UPTIME seconds (Gozunga dnf mirror)"
