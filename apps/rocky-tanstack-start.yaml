#cloud-config
# Rocky/Alma: TanStack Start starter on Node 22, systemd on :3000

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i \
        -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
        -e 's/^[[:space:]]*metalink=/# metalink=/' \
        "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i \
        -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
        -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - git

write_files:
  - path: /etc/systemd/system/tanstack-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=TanStack Start app
      After=network.target

      [Service]
      SELinuxContext=system_u:system_r:unconfined_t:s0-s0:c0.c1023
      Type=simple
      User=nobody
      WorkingDirectory=/opt/tanstack-app
      Environment=NODE_ENV=production
      Environment=PORT=3000
      Environment=HOST=0.0.0.0
      ExecStart=/usr/bin/node /opt/tanstack-app/node_modules/vite/bin/vite.js preview --port 3000 --host 0.0.0.0
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    export HOME=/root
    curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
    dnf install -y nodejs
    if [ ! -f /opt/tanstack-app/package.json ]; then
      # CLI rejects paths with /; create in temp dir then move
      cd /tmp
      npx --yes @tanstack/cli create tanstack-app -y --package-manager npm
      mv /tmp/tanstack-app /opt/tanstack-app
    fi
    cd /opt/tanstack-app
    npm install
    npm run build
    chown -R nobody:nobody /opt/tanstack-app
    systemctl daemon-reload
    systemctl enable --now tanstack-app || true

final_message: "TanStack Start listening on :3000 after $UPTIME seconds (Gozunga dnf mirror)"
