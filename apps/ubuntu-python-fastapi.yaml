#cloud-config
# Ubuntu: Python 3 venv + FastAPI + Uvicorn systemd service on :8000
# After boot: http://<server-ip>:8000/  and  /health

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-venv
  - python3-pip
  - curl

write_files:
  - path: /opt/app/main.py
    permissions: '0644'
    content: |
      from fastapi import FastAPI

      app = FastAPI(title="Gozunga FastAPI starter")

      @app.get("/")
      def root():
          return {"message": "hello from cloud-init", "stack": "fastapi"}

      @app.get("/health")
      def health():
          return {"status": "ok"}

  - path: /opt/app/requirements.txt
    permissions: '0644'
    content: |
      fastapi==0.115.12
      uvicorn[standard]==0.34.2

  - path: /etc/systemd/system/fastapi-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=FastAPI app (uvicorn)
      After=network.target

      [Service]
      Type=simple
      User=www-data
      WorkingDirectory=/opt/app
      Environment=PATH=/opt/app/.venv/bin
      ExecStart=/opt/app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - python3 -m venv /opt/app/.venv
  - /opt/app/.venv/bin/pip install --upgrade pip
  - /opt/app/.venv/bin/pip install -r /opt/app/requirements.txt
  - chown -R www-data:www-data /opt/app
  - systemctl daemon-reload
  - systemctl enable --now fastapi-app

final_message: "Python FastAPI app listening on :8000 after $UPTIME seconds (Gozunga apt mirror)"
