#cloud-config
# Ubuntu: Django starter app + gunicorn systemd on :8000

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-venv
  - python3-pip
  - curl

write_files:
  - path: /etc/systemd/system/django-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Django app (gunicorn)
      After=network.target

      [Service]
      Type=simple
      User=www-data
      WorkingDirectory=/opt/django-app
      Environment=PATH=/opt/django-app/.venv/bin
      Environment=DJANGO_SETTINGS_MODULE=config.settings
      ExecStart=/opt/django-app/.venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:8000
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    python3 -m venv /opt/django-app/.venv
    /opt/django-app/.venv/bin/pip install --upgrade pip
    /opt/django-app/.venv/bin/pip install "django==5.1.7" "gunicorn==23.0.0"
    if [ ! -f /opt/django-app/manage.py ]; then
      /opt/django-app/.venv/bin/django-admin startproject config /opt/django-app
    fi
    # Allow all hosts for first-boot demo (tighten later)
    sed -i 's/ALLOWED_HOSTS = \[\]/ALLOWED_HOSTS = ["*"]/' /opt/django-app/config/settings.py
    cd /opt/django-app && /opt/django-app/.venv/bin/python manage.py migrate --noinput
    chown -R www-data:www-data /opt/django-app
    systemctl daemon-reload
    systemctl enable --now django-app

final_message: "Django/gunicorn listening on :8000 (Gozunga apt mirror)"
