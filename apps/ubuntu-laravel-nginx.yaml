#cloud-config
# Ubuntu: PHP-FPM + Nginx + Composer skeleton Laravel app on :80
# After boot: http://<server-ip>/
# Customize APP_URL / DB settings under /var/www/laravel/.env

package_update: true
package_upgrade: true

packages:
  - nginx
  - curl
  - unzip
  - git
  - php-cli
  - php-fpm
  - php-mbstring
  - php-xml
  - php-curl
  - php-zip
  - php-bcmath
  - php-sqlite3
  - php-tokenizer
  - php-mysql
  - sqlite3

write_files:
  - path: /etc/nginx/sites-available/laravel
    permissions: '0644'
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;
          server_name _;
          root /var/www/laravel/public;
          index index.php index.html;

          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:/run/php/php-fpm.sock;
          }

          location ~ /\.(?!well-known).* {
              deny all;
          }
      }

runcmd:
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  - mkdir -p /var/www
  - |
    if [ ! -f /var/www/laravel/artisan ]; then
      composer create-project laravel/laravel /var/www/laravel --prefer-dist --no-interaction
    fi
  - chown -R www-data:www-data /var/www/laravel
  - chmod -R ug+rwx /var/www/laravel/storage /var/www/laravel/bootstrap/cache
  - ln -sfn /run/php/php*-fpm.sock /run/php/php-fpm.sock || true
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sfn /etc/nginx/sites-available/laravel /etc/nginx/sites-enabled/laravel
  - systemctl enable --now php*-fpm nginx || systemctl enable --now nginx
  - systemctl reload nginx || systemctl restart nginx

final_message: "Laravel (PHP-FPM + Nginx) ready on Ubuntu after $UPTIME seconds."
