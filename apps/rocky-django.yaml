#cloud-config
# Rocky/Alma: Django starter app + gunicorn systemd on :8000

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i \
        -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
        -e 's/^[[:space:]]*metalink=/# metalink=/' \
        "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i \
        -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
        -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        "$f"
    done

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - curl

write_files:
  - path: /etc/systemd/system/django-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Django app (gunicorn)
      After=network.target

      [Service]
      SELinuxContext=system_u:system_r:unconfined_t:s0-s0:c0.c1023
      Type=simple
      User=nobody
      WorkingDirectory=/opt/django-app
      Environment=PATH=/opt/django-app/.venv/bin
      Environment=DJANGO_SETTINGS_MODULE=config.settings
      ExecStart=/opt/django-app/.venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:8000
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    python3 -m venv /opt/django-app/.venv
    /opt/django-app/.venv/bin/pip install --upgrade pip
    /opt/django-app/.venv/bin/pip install "django==5.1.7" "gunicorn==23.0.0"
    if [ ! -f /opt/django-app/manage.py ]; then
      /opt/django-app/.venv/bin/django-admin startproject config /opt/django-app
    fi
    sed -i 's/ALLOWED_HOSTS = \[\]/ALLOWED_HOSTS = ["*"]/' /opt/django-app/config/settings.py
    cd /opt/django-app && /opt/django-app/.venv/bin/python manage.py migrate --noinput
    chown -R nobody:nobody /opt/django-app
    systemctl daemon-reload
    systemctl enable --now django-app

final_message: "Django/gunicorn listening on :8000 (Gozunga dnf mirror)"
