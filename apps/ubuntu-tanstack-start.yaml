#cloud-config
# Ubuntu: TanStack Start (Vinxi) starter on Node 22, systemd on :3000
# Scaffold APIs change; this uses the official create CLI flags when available.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - git

write_files:
  - path: /etc/systemd/system/tanstack-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=TanStack Start app
      After=network.target

      [Service]
      Type=simple
      User=www-data
      WorkingDirectory=/opt/tanstack-app
      Environment=NODE_ENV=production
      Environment=PORT=3000
      Environment=HOST=0.0.0.0
      ExecStart=/usr/bin/node /opt/tanstack-app/node_modules/vite/bin/vite.js preview --port 3000 --host 0.0.0.0
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    export HOME=/root
    export DEBIAN_FRONTEND=noninteractive
    export NEEDRESTART_MODE=a
    export NEEDRESTART_SUSPEND=1
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y nodejs
    if [ ! -f /opt/tanstack-app/package.json ]; then
      # CLI rejects paths with /; create in temp dir then move
      cd /tmp
      npx --yes @tanstack/cli create tanstack-app -y --package-manager npm
      mv /tmp/tanstack-app /opt/tanstack-app
    fi
    cd /opt/tanstack-app
    npm install
    npm run build
    chown -R www-data:www-data /opt/tanstack-app
    systemctl daemon-reload
    systemctl enable --now tanstack-app || true

final_message: "TanStack Start listening on :3000 after $UPTIME seconds (Gozunga apt mirror)"
