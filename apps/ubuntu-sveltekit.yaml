#cloud-config
# Ubuntu: SvelteKit demo app on Node 22, systemd on :3000
# Scaffolds a minimal SvelteKit project inline (sv create CLI doesn't
# support fully non-interactive use), builds with adapter-node, and
# runs via systemd.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - git

write_files:
  - path: /etc/systemd/system/sveltekit-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=SvelteKit app
      After=network.target

      [Service]
      Type=simple
      User=www-data
      WorkingDirectory=/opt/sveltekit-app
      Environment=NODE_ENV=production
      Environment=PORT=3000
      Environment=HOST=0.0.0.0
      ExecStart=/usr/bin/node build
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

  - path: /opt/sveltekit-app/package.json
    permissions: '0644'
    content: |
      {
        "name": "sveltekit-app",
        "private": true,
        "version": "0.0.1",
        "type": "module",
        "scripts": {
          "dev": "vite dev",
          "build": "vite build",
          "preview": "vite preview",
          "start": "node build"
        }
      }

  - path: /opt/sveltekit-app/svelte.config.js
    permissions: '0644'
    content: |
      import adapter from '@sveltejs/adapter-node';
      export default { kit: { adapter: adapter() } };

  - path: /opt/sveltekit-app/vite.config.js
    permissions: '0644'
    content: |
      import { sveltekit } from '@sveltejs/kit/vite';
      import { defineConfig } from 'vite';
      export default defineConfig({ plugins: [sveltekit()] });

  - path: /opt/sveltekit-app/src/app.html
    permissions: '0644'
    content: |
      <!doctype html>
      <html lang="en">
      <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width" />%sveltekit.head%</head>
      <body>%sveltekit.body%</body>
      </html>

  - path: /opt/sveltekit-app/src/routes/+page.svelte
    permissions: '0644'
    content: |
      <h1>Welcome to SvelteKit</h1>
      <p>Cloud-init deployed.</p>

runcmd:
  - |
    set -e
    export HOME=/root
    export DEBIAN_FRONTEND=noninteractive
    export NEEDRESTART_MODE=a
    export NEEDRESTART_SUSPEND=1
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y nodejs
    cd /opt/sveltekit-app
    npm install svelte @sveltejs/kit @sveltejs/adapter-node vite
    npm run build
    chown -R www-data:www-data /opt/sveltekit-app
    systemctl daemon-reload
    systemctl enable --now sveltekit-app

final_message: "SvelteKit app listening on :3000 after $UPTIME seconds (Gozunga apt mirror)"
