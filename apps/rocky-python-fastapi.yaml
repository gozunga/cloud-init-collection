#cloud-config
# Rocky/RHEL-style: Python 3 venv + FastAPI + Uvicorn systemd service on :8000
# After boot: http://<server-ip>:8000/  and  /health

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i \
        -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
        -e 's/^[[:space:]]*metalink=/# metalink=/' \
        "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i \
        -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
        -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
        "$f"
    done

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - curl

write_files:
  - path: /opt/app/main.py
    permissions: '0644'
    content: |
      from fastapi import FastAPI

      app = FastAPI(title="Gozunga FastAPI starter")

      @app.get("/")
      def root():
          return {"message": "hello from cloud-init", "stack": "fastapi"}

      @app.get("/health")
      def health():
          return {"status": "ok"}

  - path: /opt/app/requirements.txt
    permissions: '0644'
    content: |
      fastapi==0.115.12
      uvicorn[standard]==0.34.2

  - path: /etc/systemd/system/fastapi-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=FastAPI app (uvicorn)
      After=network.target

      [Service]
      SELinuxContext=system_u:system_r:unconfined_t:s0-s0:c0.c1023
      Type=simple
      User=nginx
      WorkingDirectory=/opt/app
      Environment=PATH=/opt/app/.venv/bin
      ExecStart=/opt/app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - python3 -m venv /opt/app/.venv
  - /opt/app/.venv/bin/pip install --upgrade pip
  - /opt/app/.venv/bin/pip install -r /opt/app/requirements.txt
  - id nginx >/dev/null 2>&1 || useradd -r -s /sbin/nologin nginx
  - chown -R nginx:nginx /opt/app
  - systemctl daemon-reload
  - systemctl enable --now fastapi-app

final_message: "Python FastAPI app listening on :8000 after $UPTIME seconds (Gozunga dnf mirror)"
