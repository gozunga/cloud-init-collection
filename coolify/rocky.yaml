#cloud-config
# Install Coolify on Rocky Linux using the official installer.
#
# Rocky's base image ships with a minimal kernel missing iptables/netfilter
# modules. package_upgrade installs them for the new kernel, but a reboot
# is required to load them. The Coolify installer runs post-reboot via a
# systemd oneshot service with an unconfined SELinux context (matching an
# interactive shell) so SELinux stays enforcing.
#
# After boot, open: http://<server-ip>:8000
# Open security group ports: 8000 (mgmt), 6001/6002 (optional), 80/443 (apps)

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl

write_files:
  - path: /etc/systemd/system/install-coolify.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Install Coolify (post-reboot)
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=!/var/lib/coolify/.installed

      [Service]
      Type=oneshot
      SELinuxContext=system_u:system_r:unconfined_t:s0-s0:c0.c1023
      ExecStart=/bin/bash -c 'curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash && mkdir -p /var/lib/coolify && touch /var/lib/coolify/.installed'
      RemainAfterExit=true
      TimeoutStartSec=900

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable install-coolify.service

power_state:
  mode: reboot
  message: "Rebooting to load updated kernel modules before Coolify install"
  timeout: 30
  condition: true

final_message: "Cloud-init finished. System will reboot, then Coolify installs automatically via install-coolify.service."
