#cloud-config
# Rocky/Alma: install Tailscale and optionally join a tailnet.
# Set TS_AUTHKEY before production use.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates

runcmd:
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable --now tailscaled
  # - tailscale up --auth-key=tskey-auth-REPLACE_ME --ssh

final_message: "Tailscale installed. Run: tailscale up --auth-key=... "
