#cloud-config
# Install Docker Engine on Ubuntu from Docker's official apt repository.
# Uninstalls distro Docker packages first to avoid conflicts.
# Docs: https://docs.docker.com/engine/install/ubuntu/

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl

runcmd:
  # Remove conflicting / distro Docker packages (ok if not installed)
  - |
    DEBIAN_FRONTEND=noninteractive apt-get remove -y \
      docker.io docker-compose docker-compose-v2 docker-doc podman-docker \
      containerd runc || true

  # Docker official apt repository
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    . /etc/os-release
    cat >/etc/apt/sources.list.d/docker.sources <<SRC
    Types: deb
    URIs: https://download.docker.com/linux/ubuntu
    Suites: ${UBUNTU_CODENAME:-$VERSION_CODENAME}
    Components: stable
    Architectures: $(dpkg --print-architecture)
    Signed-By: /etc/apt/keyrings/docker.asc
    SRC
    # strip accidental leading spaces from YAML-indented heredoc
    sed -i 's/^[[:space:]]\+//' /etc/apt/sources.list.d/docker.sources
  - apt-get update -y
  - |
    DEBIAN_FRONTEND=noninteractive apt-get install -y \
      docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Optional: allow default cloud user to run docker without sudo
  - |
    for u in ubuntu debian; do
      if id "$u" >/dev/null 2>&1; then usermod -aG docker "$u"; fi
    done

final_message: "Docker Engine (official) installed on Ubuntu after $UPTIME seconds."
