#cloud-config
# Rocky/Alma: HashiCorp Vault single-node bootstrap (NOT prod HA).
# TLS disabled for first boot simplicity — lock down before real secrets.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - yum-utils
  - ca-certificates

write_files:
  - path: /etc/vault.d/vault.hcl
    permissions: '0640'
    content: |
      ui = true
      disable_mlock = true

      storage "file" {
        path = "/opt/vault/data"
      }

      listener "tcp" {
        address     = "0.0.0.0:8200"
        tls_disable = 1
      }

      api_addr = "http://127.0.0.1:8200"

  - path: /etc/systemd/system/vault.service
    permissions: '0644'
    content: |
      [Unit]
      Description=HashiCorp Vault
      After=network.target

      [Service]
      User=vault
      Group=vault
      ExecStart=/usr/bin/vault server -config=/etc/vault.d/vault.hcl
      ExecReload=/bin/kill --signal HUP $MAINPID
      KillMode=process
      Restart=on-failure
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e
    yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo || \
      dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
    dnf install -y vault
    id vault >/dev/null 2>&1 || useradd --system --home /etc/vault.d --shell /sbin/nologin vault
    mkdir -p /opt/vault/data /etc/vault.d
    chown -R vault:vault /opt/vault /etc/vault.d
    systemctl daemon-reload
    systemctl enable --now vault
  - echo 'export VAULT_ADDR=http://127.0.0.1:8200' > /etc/profile.d/vault.sh

final_message: "Vault listening on :8200 (TLS disabled). Initialize/unseal before use."
