#cloud-config
# Ubuntu: single-node k3s (server + agent).
# After boot: kubectl via /usr/local/bin/kubectl and /etc/rancher/k3s/k3s.yaml
# Open ports as needed (6443 API, 80/443 if using Traefik).

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates

runcmd:
  - curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
  - |
    for u in ubuntu; do
      if id "$u" >/dev/null 2>&1; then
        mkdir -p "/home/$u/.kube"
        cp /etc/rancher/k3s/k3s.yaml "/home/$u/.kube/config"
        chown -R "$u:$u" "/home/$u/.kube"
      fi
    done

final_message: "k3s single-node installed. Try: kubectl get nodes"
