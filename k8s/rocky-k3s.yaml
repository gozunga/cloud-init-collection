#cloud-config
# Rocky/Alma: single-node k3s (server + agent).
# SELinux: k3s installer usually handles; open 6443/80/443 as needed.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates

runcmd:
  - curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
  - |
    for u in rocky alma cloud-user; do
      if id "$u" >/dev/null 2>&1; then
        mkdir -p "/home/$u/.kube"
        cp /etc/rancher/k3s/k3s.yaml "/home/$u/.kube/config"
        chown -R "$u:$u" "/home/$u/.kube"
      fi
    done

final_message: "k3s single-node installed. Try: kubectl get nodes"
