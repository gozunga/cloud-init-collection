#cloud-config
# Rocky/Alma: Nginx + Certbot (Let's Encrypt).
# Replace example.com / email before use.
# Open security group TCP/80 and TCP/443.
# certbot and python3-certbot-nginx require EPEL on Rocky/Alma 10.

package_update: true
package_upgrade: true

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done
  - dnf install -y epel-release

packages:
  - nginx
  - certbot
  - python3-certbot-nginx

write_files:
  - path: /etc/nginx/conf.d/app.conf
    permissions: '0644'
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name example.com;

          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

runcmd:
  - systemctl enable --now nginx
  - nginx -t && systemctl reload nginx
  # Uncomment after DNS points here:
  # - certbot --nginx -d example.com --non-interactive --agree-tos -m you@example.com --redirect

final_message: "Nginx reverse proxy ready. Point DNS, then run certbot (see runcmd comment)."
