#cloud-config
# Rocky/Alma: Caddy reverse proxy with automatic HTTPS (Let's Encrypt).
# Replace example.com and app backend before use.
# Open security group TCP/80 and TCP/443.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - curl
  - dnf-plugins-core

write_files:
  - path: /etc/caddy/Caddyfile
    permissions: '0644'
    content: |
      # Replace with your domain and backend
      example.com {
          reverse_proxy 127.0.0.1:3000
      }

runcmd:
  - |
    set -e
    dnf install -y 'dnf-command(copr)' || true
    dnf copr enable -y @caddy/caddy || true
    dnf install -y caddy
    mkdir -p /etc/caddy
    systemctl enable --now caddy
    systemctl reload caddy || systemctl restart caddy

final_message: "Caddy installed. Edit /etc/caddy/Caddyfile then: systemctl reload caddy"
