#cloud-config
# Rocky/Alma: Caddy reverse proxy with automatic HTTPS (Let's Encrypt).
# Replace example.com and app backend before use.
# Open security group TCP/80 and TCP/443.

package_update: true
package_upgrade: true

packages:
  - curl
  - dnf-plugins-core

write_files:
  - path: /etc/caddy/Caddyfile
    permissions: '0644'
    content: |
      # Replace with your domain and backend
      example.com {
          reverse_proxy 127.0.0.1:3000
      }

runcmd:
  - |
    set -e
    dnf install -y 'dnf-command(copr)' || true
    dnf copr enable -y @caddy/caddy || true
    dnf install -y caddy
    mkdir -p /etc/caddy
    systemctl enable --now caddy
    systemctl reload caddy || systemctl restart caddy

final_message: "Caddy installed. Edit /etc/caddy/Caddyfile then: systemctl reload caddy"
