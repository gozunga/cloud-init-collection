#cloud-config
# Ubuntu: Nginx + Certbot (Let's Encrypt).
# Replace example.com / email before use.
# Open security group TCP/80 and TCP/443.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx

write_files:
  - path: /etc/nginx/sites-available/app
    permissions: '0644'
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name example.com;

          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

runcmd:
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sfn /etc/nginx/sites-available/app /etc/nginx/sites-enabled/app
  - systemctl enable --now nginx
  - nginx -t && systemctl reload nginx
  # Uncomment after DNS points here:
  # - certbot --nginx -d example.com --non-interactive --agree-tos -m you@example.com --redirect

final_message: "Nginx reverse proxy ready. Point DNS, then run certbot (see runcmd comment)."
