#cloud-config
# Ubuntu KDE Plasma desktop (kubuntu-desktop).
# Large install; first boot can take a long time.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - kubuntu-desktop
  - sddm
  - xrdp
  - dbus-x11

runcmd:
  - |
    echo 'sddm shared/default-x-display-manager select sddm' | debconf-set-selections
  - dpkg-reconfigure -f noninteractive sddm || true
  - systemctl enable sddm || true
  - systemctl set-default graphical.target
  - systemctl enable --now xrdp || true
  - adduser xrdp ssl-cert || true
  - |
    for u in ubuntu; do
      if id "$u" >/dev/null 2>&1; then
        printf '%s\n' 'startplasma-x11' > "/home/$u/.xsession"
        chown "$u:$u" "/home/$u/.xsession"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Ubuntu KDE Plasma desktop"
  timeout: 30
  condition: true

final_message: "Ubuntu KDE Plasma desktop install finished after $UPTIME seconds."
