#cloud-config
# Rocky/Alma/RHEL-style MATE desktop (via EPEL / group packages).

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - epel-release
  - lightdm
  - xrdp
  - firefox

runcmd:
  - dnf install -y epel-release || true
  - dnf groupinstall -y "MATE Desktop" || dnf install -y @mate-desktop-environment || dnf install -y mate-desktop mate-session-manager mate-terminal caja || true
  - dnf install -y lightdm xrdp || true
  - systemctl set-default graphical.target
  - systemctl enable lightdm || true
  - systemctl enable --now xrdp || true
  - setsebool -P xrdp_can_connect_all 1 || true
  - |
    for u in rocky alma cloud-user; do
      if id "$u" >/dev/null 2>&1; then
        printf '%s\n' 'mate-session' > "/home/$u/.Xclients"
        chown "$u:$u" "/home/$u/.Xclients"
        chmod +x "/home/$u/.Xclients"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Rocky/Alma MATE desktop"
  timeout: 30
  condition: true

final_message: "Rocky/Alma MATE desktop install finished after $UPTIME seconds."
