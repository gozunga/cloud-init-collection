#cloud-config
# Ubuntu Desktop (GNOME) via ubuntu-desktop metapackage.
# Heavy install; first boot can take a long time.
#
# After install:
# - Console/local display: graphical.target
# - Remote: use RDP (xrdp) or attach a console in your hypervisor/portal
#
# Optional: set a password with chpasswd (disabled by default for safety).

package_update: true
package_upgrade: true

packages:
  - ubuntu-desktop
  - gdm3
  - xrdp
  - dbus-x11

runcmd:
  - systemctl enable gdm3 || true
  - systemctl set-default graphical.target
  - systemctl enable --now xrdp || true
  - adduser xrdp ssl-cert || true
  # Prefer GNOME session for xrdp users
  - |
    for u in ubuntu; do
      if id "$u" >/dev/null 2>&1; then
        mkdir -p "/home/$u"
        printf '%s\n' 'export GNOME_SHELL_SESSION_MODE=ubuntu' 'export XDG_CURRENT_DESKTOP=ubuntu:GNOME' 'export XDG_SESSION_TYPE=x11' 'gnome-session' > "/home/$u/.xsession"
        chown "$u:$u" "/home/$u/.xsession"
        chmod 0644 "/home/$u/.xsession"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Ubuntu GNOME desktop"
  timeout: 30
  condition: true

final_message: "Ubuntu GNOME desktop install finished after $UPTIME seconds. Reboot may be required."
