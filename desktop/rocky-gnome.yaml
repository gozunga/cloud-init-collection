#cloud-config
# Rocky/Alma/RHEL-style GNOME Workstation desktop.
# Uses Server with GUI group + GNOME packages.
# Open security group TCP/3389 if using xrdp.

bootcmd:
  - |
    set -eu
    mirror_root='https://mirror.gozunga.com/rocky-linux'
    for f in /etc/yum.repos.d/rocky*.repo /etc/yum.repos.d/Rocky*.repo; do
      [ -f "$f" ] || continue
      sed -i -e 's/^[[:space:]]*mirrorlist=/# mirrorlist=/' \
             -e 's/^[[:space:]]*metalink=/# metalink=/' "$f"
      sed -i -e 's/^[[:space:]]*#[[:space:]]*baseurl=/baseurl=/' "$f"
      sed -i -e 's|https\?://[^/]*rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' \
             -e 's|https\?://[^/]*rockylinux\.org/pub/rocky|'"${mirror_root}"'|g' \
             -e 's|https\?://dl\.rockylinux\.org/\$contentdir|'"${mirror_root}"'|g' "$f"
    done

package_update: true
package_upgrade: true

packages:
  - '@Server with GUI'
  - gnome-shell
  - gnome-terminal
  - gdm
  - xrdp
  - firefox

runcmd:
  - systemctl set-default graphical.target
  - systemctl enable gdm || true
  - systemctl enable --now xrdp || true
  # SELinux: allow xrdp (best-effort)
  - setsebool -P xrdp_can_connect_all 1 || true
  - |
    for u in rocky alma cloud-user; do
      if id "$u" >/dev/null 2>&1; then
        printf '%s\n' 'gnome-session' > "/home/$u/.Xclients"
        chown "$u:$u" "/home/$u/.Xclients"
        chmod +x "/home/$u/.Xclients"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Rocky/Alma GNOME desktop"
  timeout: 30
  condition: true

final_message: "Rocky/Alma GNOME desktop install finished after $UPTIME seconds."
