#cloud-config
# Ubuntu GNOME desktop + NVIDIA GPU drivers (open-kernel).
# Use with GPU-flavored instances (e.g. ac.nvidia_l40s1, ac.nvidia_rtx2000pro1).
# Installs NVIDIA drivers, GNOME desktop, and xrdp for remote access.
# First boot is large/slow — allow 10-15 minutes.
# After boot: RDP on TCP/3389, nvidia-smi to verify GPU.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - ubuntu-desktop
  - gdm3
  - xrdp
  - dbus-x11

write_files:
  - path: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      blacklist lbm-nouveau
      options nouveau modeset=0
      alias nouveau off
      alias lbm-nouveau off
    permissions: '0644'

runcmd:
  - update-initramfs -u
  - add-apt-repository ppa:graphics-drivers/ppa -y
  - apt update -y
  - apt install -y nvidia-driver-595-server-open nvtop
  - systemctl enable gdm3 || true
  - systemctl set-default graphical.target
  - systemctl enable --now xrdp || true
  - adduser xrdp ssl-cert || true
  - |
    for u in ubuntu; do
      if id "$u" >/dev/null 2>&1; then
        mkdir -p "/home/$u"
        printf '%s\n' 'export GNOME_SHELL_SESSION_MODE=ubuntu' 'export XDG_CURRENT_DESKTOP=ubuntu:GNOME' 'export XDG_SESSION_TYPE=x11' 'gnome-session' > "/home/$u/.xsession"
        chown "$u:$u" "/home/$u/.xsession"
        chmod 0644 "/home/$u/.xsession"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Ubuntu GNOME desktop with NVIDIA drivers"
  timeout: 30
  condition: true

final_message: "Ubuntu GNOME desktop + NVIDIA GPU install finished after $UPTIME seconds."
