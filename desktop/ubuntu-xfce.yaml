#cloud-config
# Ubuntu XFCE desktop (lighter than full GNOME).
# Good default for cloud VMs + xrdp.

bootcmd:
  - |
    for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list; do
      [ -f "$f" ] && sed -i \
        -e 's|https\?://archive\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://security\.ubuntu\.com/ubuntu|https://mirror.gozunga.com/ubuntu|g' \
        -e 's|https\?://ports\.ubuntu\.com/ubuntu-ports|https://mirror.gozunga.com/ubuntu|g' \
        "$f" || true
    done

apt:
  primary:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu
  security:
    - arches: [default]
      uri: https://mirror.gozunga.com/ubuntu

package_update: true
package_upgrade: true

packages:
  - xfce4
  - xfce4-goodies
  - xorg
  - lightdm
  - xrdp
  - dbus-x11
  - firefox

runcmd:
  - |
    echo 'lightdm shared/default-x-display-manager select lightdm' | debconf-set-selections
  - dpkg-reconfigure -f noninteractive lightdm || true
  - systemctl enable lightdm || true
  - systemctl set-default graphical.target
  - systemctl enable --now xrdp || true
  - adduser xrdp ssl-cert || true
  - |
    for u in ubuntu; do
      if id "$u" >/dev/null 2>&1; then
        printf '%s\n' 'xfce4-session' > "/home/$u/.xsession"
        chown "$u:$u" "/home/$u/.xsession"
      fi
    done

power_state:
  mode: reboot
  message: "Rebooting into Ubuntu XFCE desktop"
  timeout: 30
  condition: true

final_message: "Ubuntu XFCE desktop install finished after $UPTIME seconds."
