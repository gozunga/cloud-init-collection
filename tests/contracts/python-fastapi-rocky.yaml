# Contract: python-fastapi on Rocky via apps/rocky-python-fastapi.yaml
name: python-fastapi-rocky
example: apps/rocky-python-fastapi.yaml
image: rocky-10
flavor: gp.small1
network: Internet
keypair: openclaw-chester
security_group: cloudinit-smoke
ssh_user: rocky
probe: basic
cloud_init_timeout_seconds: 1200
expect:
  - cloud-init status succeeds
  - app service is running
  - HTTP port responds (8000)
