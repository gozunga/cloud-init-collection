# Contract: Docker Engine on Rocky via official yum/dnf repo
name: docker-rocky
example: docker/rocky-docker-official.yaml
image: rocky-10
flavor: gp.small1
network: Internet
keypair: openclaw-chester
security_group: cloudinit-smoke
ssh_user: rocky
probe: docker
cloud_init_timeout_seconds: 1200
expect:
  - cloud-init status succeeds
  - docker version succeeds
  - docker run --rm hello-world succeeds
